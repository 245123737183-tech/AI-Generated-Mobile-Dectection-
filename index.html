<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake vs Real Image Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
    <header class="hero">
        <div class="hero-content">
            <span class="eyebrow">AI Image Classifier</span>
            <h1>Fake vs Real Image Detector</h1>
            <p>Upload an image and the model will tell you whether it is real or AI-generated.</p>
        </div>
    </header>

    <main class="card">
        <section class="upload-panel">
            <label for="imageInput" class="file-drop" id="fileDrop">
                <span class="file-drop-title">Drag & drop an image here</span>
                <span class="file-drop-subtitle">or click to choose a file</span>
                <input type="file" id="imageInput" accept="image/*">
            </label>

            <button id="predictButton" onclick="predictImage()">Detect Image</button>
            <p class="helper-text">Supported formats: JPG, JPEG, PNG</p>
        </section>

        <section class="preview-panel">
            <div class="preview-card">
                <span class="preview-label">Preview</span>
                <img id="preview" alt="Selected image preview">
            </div>

            <div class="result-card">
                <div id="result" class="result-text">No image selected yet.</div>
                <div id="loader" class="loader hidden"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Make sure the backend is running at <strong>http://127.0.0.1:5000</strong> before detection.</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
